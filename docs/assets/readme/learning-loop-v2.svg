<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">算法学习闭环</title>
  <desc id="desc">动画理解、代码映射、在线练习、即时判题、分层反馈、教师诊断形成闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eefbf5"/>
    </linearGradient>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto">
      <path d="M0,0 L18,9 L0,18 Z" fill="#16835f"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="30" font-weight="700" fill="#0f172a">从“看懂”到“会写”，再回到“精准教”</text>
  <text x="600" y="88" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#52606d">动画、代码、练习、反馈与教学诊断使用同一知识映射</text>
  <g font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 145)"><rect width="160" height="104" rx="18" fill="#0f172a"/><text x="80" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">① 动画理解</text><text x="80" y="75" text-anchor="middle" font-size="15" fill="#cbd5e1">状态 / 指针 / 调用栈</text></g>
    <g transform="translate(245 145)"><rect width="160" height="104" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="3"/><text x="80" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">② 代码映射</text><text x="80" y="75" text-anchor="middle" font-size="15" fill="#52606d">变量与步骤同步</text></g>
    <g transform="translate(430 145)"><rect width="160" height="104" rx="18" fill="#ffffff" stroke="#d97706" stroke-width="3"/><text x="80" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#9a6700">③ 在线练习</text><text x="80" y="75" text-anchor="middle" font-size="15" fill="#52606d">C++17 / 自动保存</text></g>
    <g transform="translate(615 145)"><rect width="160" height="104" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="3"/><text x="80" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">④ 即时判题</text><text x="80" y="75" text-anchor="middle" font-size="15" fill="#52606d">测试点 / 错误类型</text></g>
    <g transform="translate(800 145)"><rect width="160" height="104" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/><text x="80" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#6d28d9">⑤ 分层反馈</text><text x="80" y="75" text-anchor="middle" font-size="15" fill="#52606d">提示 / 题解 / 错题</text></g>
    <g transform="translate(985 145)"><rect width="160" height="104" rx="18" fill="#16835f"/><text x="80" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">⑥ 教师诊断</text><text x="80" y="75" text-anchor="middle" font-size="15" fill="#d1fae5">薄弱点 / 教学建议</text></g>
  </g>
  <g stroke="#16835f" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M222 197 H240"/><path d="M407 197 H425"/><path d="M592 197 H610"/><path d="M777 197 H795"/><path d="M962 197 H980"/>
    <path d="M1065 260 C1065 356,140 356,140 260"/>
  </g>
  <text x="600" y="302" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#16835f">数据反馈驱动内容迭代与下一次教学</text>
  <text x="600" y="386" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#52606d">区别于“只播放动画”或“只提供题库”的单点工具，本项目交付的是完整学习闭环。</text>
</svg>
